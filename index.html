<!DOCTYPE html>
<html lang="es-PY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Somax · Ranking Semanal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Saira:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --purpleDeep:#1c0c47;--cardLine:#4b2da8;
  --red:#ff2e3b;--orange:#ffa11f;--gold:#ffc23d;
  --txt:#fff;--txtDark:#2a1560;--muted:#b9a7e8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;color:var(--txt);
  font-family:'Saira',sans-serif;
  background:linear-gradient(180deg,#43219e 0%,#2d1466 55%,#1c0c47 100%);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:clamp(30px,5vw,80px) clamp(30px,5vw,80px);
  mask-image:radial-gradient(ellipse 90% 70% at 50% 40%,#000 30%,transparent 80%)}
.wrap{flex:1;display:flex;flex-direction:column;padding:0 clamp(8px,2vw,30px);overflow:hidden;position:relative;z-index:1;min-height:0}

.topbar{display:flex;align-items:center;justify-content:center;gap:10px;padding:clamp(6px,1.2vh,16px) 0 clamp(3px,.6vh,8px);flex:none}
.title-block{text-align:center;width:100%;min-width:0}
.title-block h1{font-family:'Press Start 2P';line-height:1.06;letter-spacing:1px}
.title-block .r1{display:block;color:var(--red);font-size:clamp(15px,4.4vw,34px);text-shadow:0 2px 0 rgba(0,0,0,.35)}
.title-block .r2{display:block;color:var(--orange);font-size:clamp(18px,5.4vw,42px);text-shadow:0 2px 0 rgba(0,0,0,.35);margin-top:clamp(2px,.4vh,5px)}
.title-block .week{font-family:'Press Start 2P';color:#fff;font-size:clamp(6px,1.6vw,11px);letter-spacing:1px;margin-top:clamp(4px,.8vh,9px);opacity:.92}

/* lista */
.grid{flex:1;display:flex;min-height:0;padding:clamp(5px,1vh,12px) 0}
.list{flex:1;background:rgba(28,12,71,.55);border:1px solid var(--cardLine);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;min-height:0;backdrop-filter:blur(2px)}
.rows{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.row{flex:1;display:grid;grid-template-columns:clamp(42px,5vh,72px) minmax(0,1fr);gap:clamp(5px,1vw,16px);align-items:center;min-height:0;padding:clamp(2px,.45vh,8px) clamp(9px,1.4vw,22px);border-bottom:1px solid rgba(75,45,168,.4);transition:.15s;overflow:hidden}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(75,45,168,.22)}
.row.top1,.row.top2,.row.top3{background:rgba(255,161,31,.12)}
.plaque{font-family:'Press Start 2P';font-size:clamp(10px,1.6vh,20px);color:var(--orange);text-align:left;line-height:1}
.row-info{min-width:0;text-align:left}
.row-name{font-family:'Saira';font-weight:800;font-size:clamp(13px,1.9vh,26px);text-transform:uppercase;letter-spacing:.1px;line-height:1.04;color:#fff;white-space:nowrap;overflow:visible;text-overflow:clip;max-width:100%}
.row-line2{display:flex;align-items:center;gap:clamp(4px,.6vw,10px);margin-top:clamp(1px,.3vh,4px);flex-wrap:wrap;font-weight:700;font-size:clamp(10px,1.3vh,16px);color:var(--muted)}

/* cards inferiores */
.chips{display:flex;gap:clamp(5px,1vw,12px);flex:none;padding:clamp(4px,.8vh,10px) 0 0}
.chip{background:#fff;border-radius:10px;padding:clamp(4px,.8vh,10px) 8px;flex:1 1 0;min-width:0;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.chip .k{font-family:'Press Start 2P';font-size:clamp(6px,.95vh,10px);letter-spacing:.5px;color:var(--txtDark);line-height:1.3}
.chip .v{font-family:'Saira';font-weight:900;font-size:clamp(15px,2.5vh,32px);line-height:1;margin-top:clamp(2px,.4vh,5px);color:var(--red);white-space:nowrap}
.destaque{background:#fff;border-radius:10px;flex:none;margin-top:clamp(5px,1vw,12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(2px,.4vh,5px);padding:clamp(4px,.8vh,10px) 12px;box-shadow:0 4px 12px rgba(0,0,0,.2);text-align:center}
.destaque .k{font-family:'Press Start 2P';font-size:clamp(6px,.95vh,10px);letter-spacing:.5px;color:var(--txtDark);line-height:1.3}
.destaque .v{font-family:'Saira';font-weight:900;font-size:clamp(15px,2.5vh,32px);line-height:1;color:var(--orange);white-space:nowrap}

.foot{flex:none;display:flex;align-items:center;justify-content:center;padding:clamp(6px,1.2vh,16px) 0 clamp(8px,1.4vh,18px)}
.foot img{height:clamp(34px,6vh,74px);width:auto;opacity:1;filter:brightness(0) invert(1) saturate(0) drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.hidden{display:none}

/* cadeado flutuante */
.lock-btn{position:fixed;right:clamp(12px,2vw,26px);bottom:clamp(12px,2vh,26px);z-index:60;
  width:clamp(44px,6vh,58px);height:clamp(44px,6vh,58px);border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(160deg,#ffb347,#ff8a00);color:#1c0c47;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.45);transition:.2s}
.lock-btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 10px 24px rgba(0,0,0,.5)}
.lock-btn svg{width:48%;height:48%}

/* painel admin */
.admin{position:fixed;inset:0;z-index:100;background:#08031c;display:none;flex-direction:column;
  overflow-y:auto;padding:clamp(14px,2.5vw,28px)}
.admin.open{display:flex}
.admin-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:clamp(10px,1.8vh,18px)}
.admin-head h2{font-family:'Press Start 2P';font-size:clamp(13px,2vh,22px);color:var(--orange);letter-spacing:1px}
.admin-close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;
  font-family:'Saira';font-weight:800;font-size:clamp(12px,1.6vh,16px);padding:8px 16px;border-radius:9px;cursor:pointer;text-transform:uppercase}
.admin-close:hover{background:rgba(255,255,255,.22)}
.adm-sec{background:#130b2c;border:1px solid var(--cardLine);border-radius:12px;
  padding:clamp(10px,1.5vw,16px);margin-bottom:clamp(10px,1.6vh,16px);width:100%}
.adm-sec h3{font-family:'Press Start 2P';font-size:clamp(10px,1.35vh,13px);color:var(--gold);letter-spacing:1px;margin-bottom:clamp(8px,1.2vh,12px)}
.adm-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.adm-btn{background:linear-gradient(160deg,#ffb347,#ff8a00);border:none;color:#1c0c47;font-family:'Saira';font-weight:900;
  letter-spacing:.5px;font-size:clamp(11px,1.45vh,14px);padding:9px 16px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;gap:8px;text-transform:uppercase;transition:.18s}
.adm-btn:hover{filter:brightness(1.08);transform:translateY(-2px)}
.adm-btn.ghost{background:transparent;border:1px solid var(--cardLine);color:#fff}
.adm-btn svg{width:16px;height:16px}
.adm-note{color:var(--muted);font-weight:600;font-size:clamp(10px,1.25vh,12px);margin-top:8px;line-height:1.35}
.adm-note b{color:#fff}

table.tb{width:100%;min-width:1050px;border-collapse:collapse;font-size:clamp(10px,1.25vh,13px)}
table.tb th,table.tb td{padding:clamp(4px,.7vh,7px) clamp(5px,.8vw,9px);text-align:left;border-bottom:1px solid rgba(75,45,168,.4);line-height:1.15}
table.tb th{font-family:'Press Start 2P';font-size:clamp(6px,.85vh,9px);color:var(--gold);letter-spacing:.4px;text-transform:uppercase;position:sticky;top:0;background:#130b2c;z-index:1}
table.tb td{font-weight:600;color:#eee}
table.tb td.num,table.tb th.num{text-align:right;font-variant-numeric:tabular-nums}
table.tb td.tot{font-weight:900;color:var(--orange)}
table.tb tr:last-child td{border-bottom:none}
table.tb tr.top-rank td{background:rgba(255,161,31,.08)}
.tb-scroll{overflow:auto;max-height:52vh;border-radius:8px}
#pesos{width:100%;overflow:auto;border-radius:8px}
.peso-table{width:100%;min-width:760px;border-collapse:collapse;font-size:clamp(10px,1.22vh,13px)}
.peso-table th,.peso-table td{padding:clamp(4px,.65vh,7px) clamp(6px,.9vw,10px);border-bottom:1px solid rgba(75,45,168,.4);line-height:1.15;text-align:left}
.peso-table th{font-family:'Press Start 2P';font-size:clamp(6px,.82vh,9px);color:var(--gold);letter-spacing:.35px;text-transform:uppercase;background:#130b2c}
.peso-table th.num{text-align:right;font-variant-numeric:tabular-nums}
.peso-table td{font-weight:700;color:#eee}
.peso-table td.peso-valor{font-weight:900;color:var(--gold);white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums}
.peso-table td.peso-equiv{color:var(--muted);font-weight:700;text-align:right;white-space:nowrap}
.peso-table tr:last-child td{border-bottom:none}
.peso-note{margin-top:7px}
@media (max-width:700px){
  .topbar{padding-top:8px}
  .row{grid-template-columns:52px minmax(0,1fr);gap:8px;padding:3px 8px}
  .plaque{font-size:14px}
  .row-name{font-size:12px;letter-spacing:0;line-height:1.05}
  .row-line2{font-size:10px;gap:4px;line-height:1.1}
  .destaque{gap:2px}
  .admin{padding:12px}
  .tb-scroll{max-height:55vh}
}
@media (max-width:380px){.row-name{font-size:10.5px}.plaque{font-size:13px}.row{grid-template-columns:46px minmax(0,1fr);padding-left:6px;padding-right:6px}}
</style>
</head>

  const pts=Object.values(sub).reduce((a,b)=>a+b,0);
  return{...r,sub,pts};
}).sort((a,b)=>b.pts-a.pts);}
function fU(n){return Math.round(n).toLocaleString('es-PY')}
function fP(n){return n.toLocaleString('es-PY',{minimumFractionDigits:1,maximumFractionDigits:1})}
let CALC=[];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function infoSemana(){const hoy=new Date();const dia=hoy.getDay();const lun=new Date(hoy);lun.setDate(hoy.getDate()+(dia===0?-6:1-dia));const dom=new Date(lun);dom.setDate(lun.getDate()+6);const dd=n=>String(n.getDate()).padStart(2,'0');const mm=n=>String(n.getMonth()+1).padStart(2,'0');const semanaMes=Math.ceil(lun.getDate()/7);return `${MESES[lun.getMonth()].toUpperCase()} · SEMANA ${semanaMes} · ${dd(lun)}/${mm(lun)} AL ${dd(dom)}/${mm(dom)}/${dom.getFullYear()}`;}

function render(){
  document.getElementById('weekInfo').textContent=infoSemana();
  CALC=calc(DADOS);
  const totU=CALC.reduce((a,b)=>a+b.total,0),totCli=CALC.reduce((a,b)=>a+b.clientes,0),totPed=CALC.reduce((a,b)=>a+b.pedidos,0);
  const porSucursal={};CALC.forEach(o=>{porSucursal[o.unidade]=(porSucursal[o.unidade]||0)+o.total});
  const destaque=Object.entries(porSucursal).sort((a,b)=>b[1]-a[1])[0][0];
  document.getElementById('chips').innerHTML=
    `<div class="chip"><div class="k">CLIENTES</div><div class="v">${totCli}</div></div>`+
    `<div class="chip"><div class="k">PEDIDOS</div><div class="v">${totPed}</div></div>`+
    `<div class="chip"><div class="k">US$ TOTAL</div><div class="v">${fU(totU)}</div></div>`;
  document.getElementById('destaque').innerHTML=`<div class="k">SUCURSAL DESTACADA</div><div class="v">${destaque}</div>`;
  renderRows();
  renderAdmin();
}
function renderRows(){
  const lista=CALC.slice(0,TOP_N);
  document.getElementById('rows').innerHTML=lista.map((o,idx)=>{
    const pos=idx+1;
    return `<div class="row ${pos<=3?'top'+pos:''}">
      <div class="plaque">${pos}º</div>
      <div class="row-info">
        <div class="row-name">${o.cliente}</div>
        <div class="row-line2"><span>${o.unidade}</span><span>${o.clientes} Cliente${o.clientes>1?'s':''} · ${o.pedidos} Pedido${o.pedidos>1?'s':''}</span></div>
      </div>
    </div>`;
  }).join('');
}
function renderAdmin(){
  // pesos
  const pesos=[
    ['Cliente','0,5 pts por cliente',''],
    ['Pedido','0,5 pts por pedido',''],
    ['Agroquímicos','0,0003 pts por US$','≈ 1 pto cada US$ 3.333'],
    ['Especialidades','0,0005 pts por US$','≈ 1 pto cada US$ 2.000'],
    ['Semillas','0,00013 pts por US$','≈ 1 pto cada US$ 7.692'],
    ['Fertilizantes','0,00007 pts por US$','≈ 1 pto cada US$ 14.286']
  ];
  document.getElementById('pesos').innerHTML=
    `<table class="peso-table"><thead><tr><th>Critério</th><th class="num">Pontuação</th><th class="num">Equivalência</th></tr></thead><tbody>`+
    pesos.map(p=>`<tr><td>${p[0]}</td><td class="peso-valor">${p[1]}</td><td class="peso-equiv">${p[2]||'—'}</td></tr>`).join('')+
    `</tbody></table>`;
  // tabela geral de pontuação
  const top=CALC;
  let thead=`<tr><th>#</th><th>Gestor</th><th>Sucursal</th><th class="num">Cliente</th><th class="num">Pedido</th><th class="num">Agro</th><th class="num">Espec</th><th class="num">Semillas</th><th class="num">Fert</th><th class="num">US$ Total</th><th class="num">Pontos</th></tr>`;
  let tbody=top.map((o,i)=>
    `<tr class="${i<TOP_N?'top-rank':''}"><td>${i+1}º</td><td>${o.cliente}</td><td>${o.unidade}</td>`+
    `<td class="num">${fP(o.sub.cliente)}</td><td class="num">${fP(o.sub.pedido)}</td>`+
    `<td class="num">${fP(o.sub.agro)}</td><td class="num">${fP(o.sub.espec)}</td>`+
    `<td class="num">${fP(o.sub.semillas)}</td><td class="num">${fP(o.sub.fert)}</td>`+
    `<td class="num">${fU(o.total)}</td><td class="num tot">${fP(o.pts)}</td></tr>`).join('');
  document.getElementById('tablaPuntos').innerHTML=thead+tbody;
}

// exportar dados no mesmo formato da base
document.getElementById('exportBtn').addEventListener('click',()=>{
  const aoa=[
    ['Sucursal','Gestor','Clientes','Pedidos','U$ Agroquimicos','U$ Especialidades','U$ Semillas','U$ Fertilizantes','U$ Total'],
    ...DADOS.map(r=>[r.unidade,r.cliente,r.clientes,r.pedidos,r.agro,r.espec,r.semillas,r.fert,r.total])
  ];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:18},{wch:34},{wch:9},{wch:9},{wch:16},{wch:18},{wch:14},{wch:18},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Base');
  XLSX.writeFile(wb,'Dados_Ranking_Somax.xlsx');
});

// cadeado / admin
document.getElementById('lockBtn').addEventListener('click',()=>document.getElementById('admin').classList.add('open'));
document.getElementById('admClose').addEventListener('click',()=>document.getElementById('admin').classList.remove('open'));

document.getElementById('file').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const fr=new FileReader();fr.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1});
    let h=aoa.findIndex(r=>r.some(c=>String(c).toLowerCase().includes('cliente')));if(h<0)h=0;
    const n=[];
    for(let i=h+1;i<aoa.length;i++){const r=aoa[i];if(!r||r.length<3)continue;const nm=String(r[1]||'').trim();if(!nm)continue;
      n.push({unidade:String(r[0]||'').trim()||'—',cliente:nm,clientes:+r[2]||0,pedidos:+r[3]||0,agro:+r[4]||0,espec:+r[5]||0,semillas:+r[6]||0,fert:+r[7]||0,total:+r[8]||((+r[4]||0)+(+r[5]||0)+(+r[6]||0)+(+r[7]||0))})}
    if(n.length){DADOS=n;render();alert('Datos importados: '+n.length+' gestores.')}
    else alert('Formato esperado: Sucursal | Gestor | Clientes | Pedidos | U$ Agroquimicos | U$ Especialidades | U$ Semillas | U$ Fertilizantes | U$ Total');
  };fr.readAsArrayBuffer(file);
});
render();
</script>
